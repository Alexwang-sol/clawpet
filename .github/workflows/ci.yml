name: CI

# 触发条件
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 构建和类型检查
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -f "index.js" ]; then
            echo "Build failed: index.js not found"
            exit 1
          fi
          echo "✅ Build successful"

  # 安全审计
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated packages
        run: npm outdated || true

  # 代码质量检查
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Check file structure
        run: |
          echo "Checking project structure..."
          test -f "index.ts" && echo "✅ index.ts exists"
          test -d "src" && echo "✅ src/ directory exists"
          test -f "openclaw.plugin.json" && echo "✅ plugin config exists"
          test -f "tsconfig.json" && echo "✅ tsconfig.json exists"
          echo "✅ Structure check passed"

  # 验证插件配置
  validate-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate plugin config
        run: |
          if [ ! -f "openclaw.plugin.json" ]; then
            echo "❌ openclaw.plugin.json not found"
            exit 1
          fi

          # Check JSON validity
          if ! jq empty openclaw.plugin.json 2>/dev/null; then
            echo "❌ Invalid JSON in openclaw.plugin.json"
            exit 1
          fi

          echo "✅ Plugin config is valid"

      - name: Validate package.json
        run: |
          if ! jq empty package.json 2>/dev/null; then
            echo "❌ Invalid JSON in package.json"
            exit 1
          fi

          # Check required fields
          NAME=$(jq -r '.name' package.json)
          VERSION=$(jq -r '.version' package.json)

          if [ "$NAME" = "null" ] || [ "$VERSION" = "null" ]; then
            echo "❌ Missing required fields in package.json"
            exit 1
          fi

          echo "✅ Package config is valid"
          echo "   Name: $NAME"
          echo "   Version: $VERSION"
