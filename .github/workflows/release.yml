name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Get version from tag
        id: tag_version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release Archive
        run: |
          mkdir -p release
          cp -r src index.ts index.js package.json openclaw.plugin.json README.md tsconfig.json release/
          cd release
          tar -czf ../clawpet-${{ steps.tag_version.outputs.VERSION }}.tar.gz .
          cd ..
          zip -r clawpet-${{ steps.tag_version.outputs.VERSION }}.zip release/

      - name: Generate Changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ steps.tag_version.outputs.TAG }}" >> CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.tag_version.outputs.TAG }}
          body_path: CHANGELOG.md
          files: |
            clawpet-${{ steps.tag_version.outputs.VERSION }}.tar.gz
            clawpet-${{ steps.tag_version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README badges
        run: |
          echo "✅ Release ${{ steps.tag_version.outputs.TAG }} created successfully"
          echo "📦 Download: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag_version.outputs.TAG }}"
